name: gym_tracker

description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^19.1.0
  cupertino_icons: ^1.0.8
  table_calendar: ^3.0.0
  intl: ^0.19.0
  flutter_animate: ^4.3.0
  sqflite: ^2.0.0+4
  path_provider: ^2.0.2
  share_plus: ^7.2.1
  url_launcher: ^6.0.9
  video_player: ^2.4.5
  syncfusion_flutter_gauges: ^24.1.41
  google_nav_bar: ^5.0.6
  fl_chart: ^0.68.0
  http: ^1.4.0   # تم التحديث هنا
  flutter_tts: ^3.5.2
  string_similarity: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
    - assets/exercises.json
    - assets/exercises/
    - assets/images/
    - assets/female/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
